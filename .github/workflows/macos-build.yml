name: macOS Build

on:
  push:
    branches:
      - main
      - work
  pull_request:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Murmur (Debug)
        run: xcodebuild -project Murmur.xcodeproj -scheme Murmur -configuration Debug -destination 'platform=macOS' build
