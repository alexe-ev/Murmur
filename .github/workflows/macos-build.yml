name: macOS Build

on:
  push:
    branches:
      - main
      - work
  pull_request:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Murmur (Debug)
        run: xcodebuild -project Murmur.xcodeproj -scheme Murmur -configuration Debug -destination 'platform=macOS' build
